services:
  - type: web
    name: swing-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: BOT_TOKEN
        value: ""
      - key: TELEGRAM_CHAT_ID
        value: ""
